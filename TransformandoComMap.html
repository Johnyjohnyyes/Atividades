<!DOCTYPE html>
<html>
<head>
    <title>Produtos com Desconto</title>
    <style>
    body{background:#f3e5f5;color:#333;font-family:Arial,sans-serif}
    h1{color:#7b1fa2;text-align:center;font-size:2.3em;margin-bottom:10px}
    .container{max-width:700px;margin:30px auto;padding:35px;background:#fff;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.15)}
    .btn-calcular{padding:18px 35px;background:#9c27b0;color:white;border:none;border-radius:12px;cursor:pointer;font-size:18px;font-weight:bold;display:block;margin:25px auto}
    .btn-calcular:hover{background:#7b1fa2;transform:scale(1.05)}
    .produto-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:30px}
    .produto-card{background:#fafafa;padding:25px;border-radius:15px;border:3px solid #e1bee7;text-align:center;transition:transform 0.3s}
    .produto-card:hover{transform:translateY(-5px);box-shadow:0 8px 25px rgba(0,0,0,0.15)}
    .nome-produto{font-size:22px;font-weight:bold;color:#4a148c;margin-bottom:10px}
    .preco-original{color:#666;font-size:18px;text-decoration:line-through;margin-bottom:8px}
    .preco-desconto{color:#d32f2f;font-size:24px;font-weight:bold}
    .desconto-tag{background:#4caf50;color:white;padding:8px 16px;border-radius:25px;font-weight:bold;font-size:16px;margin-top:15px;display:inline-block}
    .sem-desconto{color:#999;font-style:italic;text-align:center;padding:40px;font-size:18px}
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Produtos com 10% OFF</h1>
        
        <button class="btn-calcular" onclick="calcularDesconto()">Calcular Descontos</button>
        
        <div id="produtosLista">
            <div class="sem-desconto">Clique no botão para ver os produtos com desconto!</div>
        </div>
    </div>

    <script>
    var produtos = [
        {nome: "Mouse", preco: 50},
        {nome: "Teclado", preco: 100},
        {nome: "Monitor", preco: 800},
        {nome: "Mousepad", preco: 25},
        {nome: "Webcam", preco: 150}
    ]

    function calcularDesconto(){
        var comDesconto = produtos.map(function(produto){
            return {
                nome: produto.nome,
                precoOriginal: produto.preco,
                precoDesconto: produto.preco * 0.9
            }
        })
        
        mostrarProdutos(comDesconto)
    }

    function mostrarProdutos(lista){
        var html = ""
        for(var i=0; i<lista.length; i++){
            html += '<div class="produto-card">'
            html += '<div class="nome-produto">' + lista[i].nome + '</div>'
            html += '<div class="preco-original">R$ ' + lista[i].precoOriginal.toFixed(2) + '</div>'
            html += '<div class="preco-desconto">R$ ' + lista[i].precoDesconto.toFixed(2) + '</div>'
            html += '<div class="desconto-tag">10% OFF</div>'
            html += '</div>'
        }
        document.getElementById("produtosLista").innerHTML = '<div class="produto-grid">' + html + '</div>'
    }
    </script>
</body>
</html>
